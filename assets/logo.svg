<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="effract logo">
  <title>effract</title>
  <defs>
    <linearGradient id="violet" x1="0" y1="0" x2="120" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b6cff"/>
      <stop offset="1" stop-color="#6d4dff"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="120" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34e0cf"/>
      <stop offset="1" stop-color="#19b6a8"/>
    </linearGradient>
    <!-- Knock a hole in the upper strand at the middle crossing so the lower
         one shows through — the over-under of a woven braid. -->
    <mask id="weave">
      <rect width="120" height="120" fill="white"/>
      <circle cx="60" cy="60" r="9.5" fill="black"/>
    </mask>
  </defs>
  <rect x="2" y="2" width="116" height="116" rx="28" fill="#0b0e14" stroke="#222838" stroke-width="2"/>
  <g fill="none" stroke-width="9" stroke-linecap="round">
    <!-- the Effect fiber -->
    <path d="M12,60 C 18,44 30,44 36,60 C 42,76 54,76 60,60 C 66,44 78,44 84,60 C 90,76 102,76 108,60"
          stroke="url(#violet)"/>
    <!-- the React fiber, woven over and under -->
    <path d="M12,60 C 18,76 30,76 36,60 C 42,44 54,44 60,60 C 66,76 78,76 84,60 C 90,44 102,44 108,60"
          stroke="url(#teal)" mask="url(#weave)"/>
  </g>
</svg>
