name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up toolchain (mise → node, pnpm, just, lefthook)
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify (lint + format + typecheck + boundaries + knip + test)
        run: just verify

  examples:
    name: build examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up toolchain (mise → node, pnpm, just)
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Set up Bun (for the bun-ssr example)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build the four example apps
        run: just build-examples

  landing:
    name: landing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up toolchain (mise → node, pnpm, just)
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check the landing site (lint + format + astro check)
        run: pnpm --filter @effract/landing run check

      - name: Build the landing site
        run: pnpm --filter @effract/landing run build
