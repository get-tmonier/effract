name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide what changed so the package jobs and the landing job only run when
  # their files are touched. The workflow itself always runs, so jobs gated off
  # by `if:` report as "skipped" — which satisfies required status checks.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.packages }}
      landing: ${{ steps.filter.outputs.landing }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            packages:
              - 'packages/**'
              - 'apps/**'
              - 'examples/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig*.json'
              - '.oxlintrc.json'
              - '.oxfmtrc.json'
              - 'knip.config.ts'
              - '.dependency-cruiser.cjs'
              - 'lefthook.yml'
              - '.mise.toml'
              - 'justfile'
              - '.github/workflows/ci.yml'
            landing:
              - 'landing/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'

  verify:
    name: verify
    needs: changes
    if: ${{ needs.changes.outputs.packages == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up toolchain (mise → node, pnpm, just, lefthook)
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify (lint + format + typecheck + boundaries + knip + test)
        run: just verify

  examples:
    name: build examples
    needs: changes
    if: ${{ needs.changes.outputs.packages == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up toolchain (mise → node, pnpm, just)
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Set up Bun (for the bun-ssr example)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build the four example apps
        run: just build-examples

  landing:
    name: landing
    needs: changes
    if: ${{ needs.changes.outputs.landing == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up toolchain (mise → node, pnpm, just)
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check the landing site (lint + format + astro check)
        run: pnpm --filter @effract/landing run check

      - name: Build the landing site
        run: pnpm --filter @effract/landing run build
