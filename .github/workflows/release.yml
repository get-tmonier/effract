name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub release
  id-token: write # npm provenance attestation

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4

      - name: Set up toolchain (mise → node, pnpm, just)
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: just verify

      - name: Set package versions from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Releasing $VERSION"
          for dir in packages/effract packages/effract-vite; do
            ( cd "$dir" && npm pkg set version="$VERSION" )
          done

      - name: Build packages
        run: just build

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (with provenance)
        run: pnpm -r --filter "./packages/*" publish --access public --no-git-checks --provenance

      - name: Create GitHub release (notes from CHANGELOG)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '$0 ~ "^## \\[" v "\\]"{f=1;next} f&&/^## \[/{f=0} f' CHANGELOG.md > notes.md
          [ -s notes.md ] || echo "See [CHANGELOG.md](./CHANGELOG.md)." > notes.md
          gh release create "$GITHUB_REF_NAME" --title "effract $GITHUB_REF_NAME" --notes-file notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
