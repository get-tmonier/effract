packages:
  - "packages/*"
  - "apps/*"
  - "examples"
  - "landing"

allowBuilds:
  '@parcel/watcher': false
  esbuild: true
  msgpackr-extract: false
  sharp: true

# Single source of truth for every dependency version in the monorepo.
# Exact pins only — no ranges. Bump with `just bump` (npm-check-updates).
catalog:
  # --- Effect v4 (latest beta line) ---
  effect: 4.0.0-beta.88

  # --- React 19.2 (the only supported line) ---
  react: 19.2.7
  react-dom: 19.2.7
  "@types/react": 19.2.17
  "@types/react-dom": 19.2.3

  # --- Build / dev tooling ---
  vite: 8.1.0
  "@vitejs/plugin-react": 6.0.3
  tailwindcss: 4.3.1
  "@tailwindcss/vite": 4.3.1
  "@tailwindcss/postcss": 4.3.1
  "@tailwindcss/cli": 4.3.1
  vitest: 4.1.9
  "happy-dom": 20.10.6
  typescript: 6.0.3
  "@typescript/native-preview": 7.0.0-dev.20260624.1

  # --- Lint / format / boundaries / dead-code ---
  oxlint: 1.71.0
  oxfmt: 0.56.0
  tsdown: 0.22.3
  "dependency-cruiser": 17.4.3
  knip: 6.20.0
  "npm-check-updates": 22.2.1

  # --- App frameworks (examples) ---
  next: 16.2.9
  "@tanstack/react-start": 1.168.26
  "@tanstack/react-router": 1.170.16

  # --- Types ---
  "@types/node": 26.0.0
  "@types/bun": 1.3.14
